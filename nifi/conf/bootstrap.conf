# Java command to use when running NiFi
java=java

# JVM memory settings
java.arg.1=-Xms512m
java.arg.2=-Xms512m

# Set the working directory
working.dir=.

# Specify NiFi home directory
nifi.home=/opt/nifi/nifi-current

# Configure where NiFi's lib and conf directories live
lib.dir=./lib
conf.dir=./conf