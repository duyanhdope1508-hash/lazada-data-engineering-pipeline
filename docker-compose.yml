version: '3.8'

services:
  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./monitoring/rules:/etc/prometheus/rules
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    networks:
      - app_network
    profiles: ["infra"]

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
      - GF_USERS_ALLOW_SIGN_UP=false
    networks:
      - app_network
    depends_on:
      - prometheus
    profiles: ["infra"]


  zookeeper:
    image: wurstmeister/zookeeper
    ports:
      - "2181:2181"
    profiles: ["infra"]

  kafka:
    image: wurstmeister/kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_ADVERTISED_HOST_NAME: localhost
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_CREATE_TOPICS: "tiki-products:1:1"
    depends_on:
      - zookeeper
    profiles: ["infra"]

  namenode:
    image: bde2020/hadoop-namenode:2.0.0-hadoop3.2.1-java8
    container_name: namenode
    hostname: namenode
    ports:
      - "9870:9870"
      - "9000:9000"
      - "8020:8020"
    env_file:
      - ./hadoop.env
    volumes:
      - hadoop_namenode:/hadoop/dfs/name
    networks:
      - app_network
    profiles: [ "infra" ]

  datanode:
      image: bde2020/hadoop-datanode:2.0.0-hadoop3.2.1-java8
      container_name: datanode
      hostname: datanode
      env_file:
        - ./hadoop.env
      volumes:
        - hadoop_datanode:/hadoop/dfs/data
      depends_on:
        - namenode
      networks:
        - app_network
      profiles: [ "infra" ]


  postgres:
    image: postgres:14
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    profiles: ["infra"]
    networks:
      - app_network


  cassandra:
    image: cassandra:latest
    ports:
      - "9042:9042"
    profiles: ["infra"]

  nifi:
    image: apache/nifi:1.23.2
    ports:
      - "8080:8080"
    environment:
      - NIFI_WEB_HTTP_PORT=8080
      - NIFI_CLUSTER_IS_NODE=false
      - NIFI_CLUSTER_NODE_PROTOCOL_PORT=8082
      - NIFI_HOME=/opt/nifi/nifi-current
      - SINGLE_USER_CREDENTIALS_USERNAME=${NIFI_SINGLE_USER_USERNAME}
      - SINGLE_USER_CREDENTIALS_PASSWORD=${NIFI_SINGLE_USER_PASSWORD}
      - NIFI_WEB_PROXY_HOST=localhost:8080
      - NIFI_WEB_HTTP_HOST=0.0.0.0
      - NIFI_JAVA_OPTS=-Xms512m -Xmx2g -Djava.net.preferIPv4Stack=true
      - NIFI_SENSITIVE_PROPS_KEY=${NIFI_SENSITIVE_PROPS_KEY}
      - NIFI_JVM_HEAP_INIT=512m
      - NIFI_JVM_HEAP_MAX=2g
      - NIFI_WEB_JETTY_MAX_THREADS=200
      - NIFI_WEB_JETTY_MIN_THREADS=10
      - NIFI_FLOW_CONFIGURATION_FILE=/opt/nifi/nifi-current/conf/flow.xml.gz
      - NIFI_FLOW_CONFIGURATION_ARCHIVE_ENABLED=true
      - NIFI_FLOW_CONFIGURATION_ARCHIVE_MAX_TIME=30 days
      - NIFI_FLOW_CONFIGURATION_ARCHIVE_MAX_STORAGE=500 MB
    volumes:
      - ./nifi/conf:/opt/nifi/nifi-current/conf
      - ./nifi/state:/opt/nifi/nifi-current/state
      - ./nifi/logs:/opt/nifi/nifi-current/logs
      - ./nifi/database_repository:/opt/nifi/nifi-current/database_repository
      - ./nifi/flowfile_repository:/opt/nifi/nifi-current/flowfile_repository
      - ./nifi/content_repository:/opt/nifi/nifi-current/content_repository
      - ./nifi/provenance_repository:/opt/nifi/nifi-current/provenance_repository
      - ./nifi/templates:/opt/nifi/nifi-current/templates
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/nifi"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped
    user: "1000:1000"
    profiles: ["infra"]



  superset:
    image: apache/superset
    ports:
      - "8088:8088"
    environment:
      - SUPERSET_SECRET_KEY=${SUPERSET_SECRET_KEY}
      - POSTGRES_DB=${DB_NAME}
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_HOST=${DB_HOST}
      - POSTGRES_PORT=${DB_PORT}
    volumes:
      - ./superset:/app/superset_home
    depends_on:
      - postgres
    profiles: ["infra"]
    networks:
      - app_network

  superset_db:
    image: postgres:14
    environment:
      - POSTGRES_DB=${SUPERSET_DB}
      - POSTGRES_USER=${SUPERSET_DB_USER}
      - POSTGRES_PASSWORD=${SUPERSET_DB_PASSWORD}
    volumes:
      - superset_db_data:/var/lib/postgresql/data
    profiles: ["infra"]

volumes:
  hadoop_namenode:
  hadoop_datanode:
  postgres_data:
  prometheus_data:
  grafana_data:
  superset_db_data:

networks:
  app_network:
    driver: bridge


