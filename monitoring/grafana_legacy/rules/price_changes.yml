groups:
  - name: lazada_price_changes
    rules:
      - alert: PriceVolatility
        expr: changes(lazada_product_price[1h]) > 5
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: "High price volatility detected"
          description: "Product {{ $labels.name }} price changed more than 5 times in last hour"

      - alert: TechnicalIndicatorAlert
        expr: lazada_price_rsi > 70 or lazada_price_rsi < 30
        for: 30m
        labels:
          severity: info
        annotations:
          summary: "Technical indicator alert"
          description: "RSI for product {{ $labels.name }} is in overbought/oversold territory"